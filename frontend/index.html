<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UvicornForge AI – Startup Brief Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --bg: #0a0f1c;
            --panel: #0f172a;
            --panel-border: #1e2937;
            --accent: #e11d48; /* AMD-inspired red */
            --accent-hover: #be123c;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --warning: #eab308;
        }
        body {
            margin: 0;
            padding: 1.5rem;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #05070f;
            background-image: 
                radial-gradient(circle at 25% 20%, rgba(225, 29, 72, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 75% 80%, rgba(225, 29, 72, 0.04) 0%, transparent 50%);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }
        h1 {
            margin: 0 0 0.25rem;
            font-size: 1.85rem;
            letter-spacing: -0.02em;
        }
        .subtitle {
            color: var(--text-muted);
            margin: 0 0 0.5rem;
            font-size: 1rem;
        }
        .tagline {
            font-size: 0.85rem;
            color: #fda4af;
            margin-bottom: 1rem;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .panel {
            flex: 1 1 380px;
            padding: 1.5rem;
            border-radius: 18px;
            background: #0f172a;
            border: 1px solid #334155;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.15), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .panel:hover {
            transform: translateY(-2px);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
        }
        .panel h2 {
            margin: 0 0 1.25rem;
            font-size: 1.05rem;
            color: #e2e8f0;
            padding-bottom: 0.65rem;
            border-bottom: 1px solid #1e2937;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            font-weight: 600;
            font-size: 0.85rem;
        }
        label {
            display: block;
            margin-top: 0.85rem;
            margin-bottom: 0.3rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: #94a3b8;
            letter-spacing: 0.4px;
        }
        textarea, input, select {
            width: 100%;
            padding: 0.65rem 0.85rem;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #0b1222;
            color: var(--text);
            font-size: 0.95rem;
            transition: all 0.15s ease;
        }
        textarea:focus, input:focus, select:focus {
            outline: none;
            border-color: #e11d48;
            box-shadow: 0 0 0 3px rgba(225, 29, 72, 0.12);
            background: #0f172a;
        }
        textarea { min-height: 96px; resize: vertical; }
        button {
            margin-top: 1.25rem;
            padding: 0.85rem 1.6rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #e11d48, #be123c);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.3px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgb(225 29 72 / 0.3), 0 2px 4px -2px rgb(225 29 72 / 0.3);
        }
        button:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgb(225 29 72 / 0.4);
            background: linear-gradient(135deg, #f43f5e, #e11d48);
        }
        button:active:not(:disabled) {
            transform: translateY(0);
        }
        button:active:not(:disabled) {
            transform: translateY(1px);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .secondary-btn {
            background: #1e2937;
            color: #cbd5e1;
            padding: 0.55rem 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 0.5rem;
            border-radius: 10px;
            transition: all 0.15s ease;
        }
        .secondary-btn:hover:not(:disabled) {
            background: #334155;
            color: #f1f5f9;
            transform: translateY(-1px);
        }
        pre {
            white-space: pre-wrap;
            background: #020617;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--panel-border);
            max-height: 65vh;
            overflow: auto;
            font-size: 0.9rem;
            line-height: 1.45;
        }
        #status {
            margin-top: 0.6rem;
            font-size: 0.82rem;
            color: var(--text-muted);
            min-height: 1.1em;
        }
        .system-status {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            margin: 0.5rem 0 1rem;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }
        .badge {
            font-size: 0.68rem;
            padding: 0.22rem 0.7rem;
            border-radius: 999px;
            border: 1px solid #334155;
            background: rgba(30, 41, 59, 0.7);
            color: #94a3b8;
            white-space: nowrap;
            backdrop-filter: blur(6px);
            transition: all 0.1s ease;
        }
        .badge.ok { border-color: #166534; color: #4ade80; background: rgba(16, 185, 129, 0.1); }
        .badge.warn { border-color: #854d0e; color: #facc15; background: rgba(234, 179, 8, 0.1); }
        .badge.amd { border-color: #e11d48; color: #fda4af; background: rgba(225, 29, 72, 0.12); }
        .amd-highlight {
            color: #fda4af;
            font-weight: 500;
        }
        .demo-presets {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }
        .demo-btn {
            font-size: 0.68rem;
            padding: 0.28rem 0.7rem;
            background: rgba(30, 41, 59, 0.6);
            color: #64748b;
            border: 1px solid #334155;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.1s ease;
            font-weight: 500;
        }
        .demo-btn:hover {
            background: #1e2937;
            color: #e2e8f0;
            border-color: #475569;
            transform: translateY(-1px);
        }
        .score-display {
            margin: 0.75rem 0;
            padding: 1.25rem 1rem;
            background: linear-gradient(145deg, #0f172a, #020617);
            border: 1px solid #334155;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.2);
            position: relative;
            overflow: hidden;
        }
        .score-display::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 40%;
            height: 200%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255,255,255,0.06),
                transparent
            );
            transform: skewX(-25deg);
            animation: shimmer 2.5s infinite;
        }
        @keyframes shimmer {
            100% { transform: translateX(300%); }
        }
        .score-value {
            font-size: 3.25rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(90deg, #fda4af, #e11d48);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 12px rgba(225, 29, 72, 0.25);
        }
        .score-label {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #fda4af;
            margin-top: 0.35rem;
            text-transform: uppercase;
        }
        .progress {
            height: 10px;
            background: #1e2937;
            border-radius: 999px;
            overflow: hidden;
            margin: 0.6rem 0 0.3rem;
            box-shadow: inset 0 1px 2px rgb(0 0 0 / 0.3);
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(to right, #e11d48, #fb7185);
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 8px rgba(225, 29, 72, 0.5);
        }
        .brief-content {
            background: #020617;
            border: 1px solid #334155;
            border-radius: 14px;
            padding: 1.25rem;
            max-height: 65vh;
            overflow: auto;
            font-size: 0.95rem;
            line-height: 1.55;
            box-shadow: inset 0 1px 0 rgb(255 255 255 / 0.02);
        }
        .brief-content h3 {
            margin: 1.1rem 0 0.35rem;
            font-size: 0.92rem;
            color: #f1f5f9;
            font-weight: 600;
            letter-spacing: 0.3px;
            padding-bottom: 4px;
            border-bottom: 1px solid #1e2937;
        }
        .brief-content h3:first-child { margin-top: 0; }
        .brief-content p {
            margin: 0.15rem 0 0.7rem;
            color: #cbd5e1;
        }
        .brief-content .pitch {
            font-style: italic;
            color: #f8fafc;
            background: #1e2937;
            padding: 0.65rem 0.8rem;
            border-radius: 10px;
            margin: 0.5rem 0 0.9rem;
            border-left: 3px solid #e11d48;
        }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #334155;
            border-top-color: #e11d48;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .panel { flex: 1 1 auto; }
        }
    </style>
</head>
<body>
    <header style="max-width: 1200px; margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;">
        <div>
            <div style="display: flex; align-items: center; gap: 12px;">
                <div style="width: 42px; height: 42px; background: linear-gradient(135deg, #e11d48, #f43f5e); border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(225, 29, 72, 0.3);">
                    <span style="color: white; font-weight: 800; font-size: 22px; letter-spacing: -1px;">UF</span>
                </div>
                <div>
                    <h1 style="margin: 0; font-size: 2rem; letter-spacing: -0.03em; background: linear-gradient(90deg, #f8fafc, #e2e8f0); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">UnicornForge AI</h1>
                    <p class="subtitle" style="margin: 0; font-size: 0.95rem;">Turn a rough idea into a judge-ready startup brief in seconds.</p>
                </div>
            </div>
        </div>
        <div class="tagline" style="margin: 0; font-size: 0.8rem; padding: 6px 14px; background: rgba(225,29,72,0.1); border-radius: 999px; border: 1px solid rgba(225,29,72,0.2);">
            🚀 <span class="amd-highlight">AMD</span> + <span class="amd-highlight">Fireworks</span> ready for the Unicorn Track
        </div>
    </header>

    <div id="system_status" class="system-status"></div>

    <div class="container">
        <section class="panel">
            <h2>Input</h2>

            <div class="demo-presets" style="margin-bottom: 0.25rem;">
                <span style="font-size:0.68rem; color:#64748b; margin-right:0.5rem; align-self:center; font-weight:500;">Quick demos:</span>
                <button type="button" class="demo-btn" data-preset="ai-hack">🚀 AI Hack Co-pilot</button>
                <button type="button" class="demo-btn" data-preset="amd-ml">⚡ AMD Edge ML</button>
                <button type="button" class="demo-btn" data-preset="fireworks">🔥 Fireworks Studio</button>
            </div>

            <label for="project_idea">Project idea *</label>
            <textarea id="project_idea" rows="4"
                      placeholder="Describe your idea in a few sentences…"></textarea>

            <label for="target_users">Target users (optional)</label>
            <input id="target_users" type="text" placeholder="e.g. hackathon teams, students, founders">

            <label for="industry">Industry (optional)</label>
            <input id="industry" type="text" placeholder="e.g. education, healthcare, productivity">

            <label for="available_time">Available time (optional)</label>
            <input id="available_time" type="text" placeholder="e.g. 24 hours, one weekend">

            <label for="available_technologies">Available technologies (optional)</label>
            <input id="available_technologies" type="text"
                   placeholder="e.g. AMD GPUs, Fireworks AI API, Python">

            <div style="display:flex; gap:0.75rem;">
                <div style="flex:1">
                    <label for="team_size">Team size (optional)</label>
                    <input id="team_size" type="number" min="1" max="20" placeholder="e.g. 3">
                </div>
                <div style="flex:1">
                    <label for="total_funding">Total funding $k (opt.)</label>
                    <input id="total_funding" type="number" min="0" placeholder="e.g. 150">
                </div>
            </div>

            <button id="generate_btn">Generate Startup Brief</button>
            <div id="status"></div>
        </section>

        <section class="panel">
            <h2>Generated Startup Brief</h2>
            <button id="copy_btn" type="button" class="secondary-btn">📋 Copy as Markdown</button>
            <div id="download_area" class="download-buttons" style="margin: 0.75rem 0; display: none; flex-wrap: wrap; gap: 0.45rem;">
                <button id="dl_full_kit" type="button" class="secondary-btn">📦 Full Starter Kit</button>
                <button id="dl_readme" type="button" class="secondary-btn">📄 README</button>
                <button id="dl_mvp" type="button" class="secondary-btn">✅ MVP Checklist</button>
                <button id="dl_pitch" type="button" class="secondary-btn">🎤 Pitch + Demo</button>
            </div>
            <div id="score_area" style="display:none;"></div>
            <div id="brief_content" class="brief-content" style="display:none;"></div>
            <pre id="output" style="display:none;">(Waiting for input...)</pre>
        </section>
    </div>

    <footer style="max-width: 1200px; margin: 2.5rem auto 0; text-align: center; font-size: 0.7rem; color: #475569;">
        Built for the AMD Hackathon • Unicorn Track • Powered by Fireworks AI + local AMD-tuned models
    </footer>

    <script>
        // Determine API base:
        // - If the HTML is served by the backend (http/https), use the current origin (works on any port).
        // - Otherwise (opened directly as file://), fall back to localhost:8000.
        let apiBaseUrl = "http://localhost:8000";
        if (window.location.protocol === "http:" || window.location.protocol === "https:") {
            apiBaseUrl = window.location.origin;
        }

        const generateBtn = document.getElementById("generate_btn");
        const copyBtn = document.getElementById("copy_btn");
        const statusEl = document.getElementById("status");
        const outputEl = document.getElementById("output");
        const systemStatusEl = document.getElementById("system_status");

        function badge(label, ok, extraClass = "") {
            const span = document.createElement("span");
            const base = ok ? "ok" : "warn";
            span.className = `badge ${base} ${extraClass}`.trim();
            span.textContent = label;
            return span;
        }

        async function loadSystemStatus() {
            try {
                // Fetch both in parallel so the (potentially slower) fresh metrics
                // evaluation doesn't block the rest of the status.
                const [infoRes, metricsRes] = await Promise.allSettled([
                    fetch(`${apiBaseUrl}/model-info`),
                    fetch(`${apiBaseUrl}/model-metrics`),
                ]);

                let info = {};
                if (infoRes.status === "fulfilled" && infoRes.value.ok) {
                    info = await infoRes.value.json();
                } else {
                    throw new Error("model-info unavailable");
                }

                // Use fresh live-evaluated metrics when available (from evaluate_saved_model).
                // This ensures Validation R² shows the real current model performance
                // instead of the (possibly stale) value baked into metadata.pkl.
                let valR2 = info.val_r2;
                if (metricsRes.status === "fulfilled" && metricsRes.value.ok) {
                    try {
                        const fresh = await metricsRes.value.json();
                        if (fresh && fresh.metrics && typeof fresh.metrics.r2 === "number") {
                            valR2 = fresh.metrics.r2;
                        }
                    } catch (parseErr) {
                        console.debug("Could not parse /model-metrics response", parseErr);
                    }
                }

                const metricsLabel = valR2 != null ? `R² ${Number(valR2).toFixed(2)}` : "metrics pending";
                systemStatusEl.replaceChildren(
                    badge(`Dataset: ${info.dataset_rows || 0} rows`, info.dataset_loaded),
                    badge(`ML model: ${info.success_model_ready ? "ready" : "offline"}`, info.success_model_ready),
                    badge(`Validation: ${metricsLabel}`, valR2 != null),
                    badge(`GPU: ${info.cuda_available ? (info.device_name || "AMD/ROCm") : "CPU"}`, info.cuda_available),
                    badge(`Fireworks + AMD`, true, "amd"),
                    badge(`Brief: ${info.fireworks_configured ? "Fireworks AI" : "dataset"}`, true),
                );
            } catch (err) {
                console.warn("Could not load system status from", apiBaseUrl, err);
                systemStatusEl.replaceChildren(badge("Backend not reachable — start uvicorn", false));
            }
        }

        function getFormData() {
            let tech = document.getElementById("available_technologies").value.trim() || "";

            return {
                project_idea: document.getElementById("project_idea").value.trim(),
                target_users: document.getElementById("target_users").value.trim() || null,
                industry: document.getElementById("industry").value.trim() || null,
                available_time: document.getElementById("available_time").value.trim() || null,
                available_technologies: tech || null,
                team_size: document.getElementById("team_size").value ? parseFloat(document.getElementById("team_size").value) : null,
                total_funding: document.getElementById("total_funding").value ? parseFloat(document.getElementById("total_funding").value) : null,
            };
        }

        function fillPreset(preset) {
            const idea = document.getElementById("project_idea");
            const tech = document.getElementById("available_technologies");
            const users = document.getElementById("target_users");
            const industry = document.getElementById("industry");
            const time = document.getElementById("available_time");

            if (preset === "ai-hack") {
                idea.value = "AI co-pilot that helps hackathon teams rapidly turn raw ideas into polished startup briefs, pitch decks, and demo scripts.";
                users.value = "hackathon teams, student founders, early-stage builders";
                industry.value = "productivity, developer tools";
                time.value = "24-48 hours";
                tech.value = "Python, FastAPI, AMD GPUs, Fireworks AI";
                document.getElementById("team_size").value = "3";
                document.getElementById("total_funding").value = "50";
            } else if (preset === "amd-ml") {
                idea.value = "Real-time edge ML inference demo running on AMD Instinct MI300X for low-latency computer vision in industrial IoT scenarios.";
                users.value = "industrial engineers, embedded teams, hackathon judges";
                industry.value = "industrial IoT, manufacturing";
                time.value = "one weekend";
                tech.value = "AMD Instinct MI300X, ROCm, PyTorch, ONNX";
                document.getElementById("team_size").value = "4";
                document.getElementById("total_funding").value = "0";
            } else if (preset === "fireworks") {
                idea.value = "A Fireworks AI-powered multi-agent studio that lets users compose, test and deploy structured LLM workflows with one click.";
                users.value = "AI engineers, prompt designers, startup founders";
                industry.value = "AI tooling, developer experience";
                time.value = "36 hours";
                tech.value = "Fireworks AI, Python, React, FastAPI";
                document.getElementById("team_size").value = "2";
                document.getElementById("total_funding").value = "120";
            }
            statusEl.textContent = "Preset loaded — click Generate!";
        }

        // Wire demo preset buttons
        document.querySelectorAll(".demo-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                const preset = btn.getAttribute("data-preset");
                if (preset) fillPreset(preset);
            });
        });

        function toMarkdown(brief) {
            const lines = [
                `# ${brief.project_name}`,
                "",
                `**One-sentence pitch**`,
                "",
                brief.one_sentence_pitch,
            ];

            if (brief.success_score !== null && brief.success_score !== undefined) {
                const label = brief.success_label ? ` (${brief.success_label})` : "";
                lines.push("", `**Predicted startup success score:** ${Number(brief.success_score).toFixed(1)} / 10${label}`);
            }
            if (brief.score_factors) {
                lines.push("", `**Score factors:** industry=${brief.score_factors.industry || "-"}, tech=${brief.score_factors.tech_stack || "-"}, stage=${brief.score_factors.funding_stage || "-"}`);
            }
            if (brief.llm_source) {
                lines.push("", `**Brief source:** ${brief.llm_source}${brief.model_source ? ` | score model: ${brief.model_source}` : ""}`);
            }
            if (brief.similar_startups && brief.similar_startups.length) {
                lines.push("", `**Similar startups from dataset:**`);
                brief.similar_startups.forEach((s) => {
                    lines.push(`- ${s.name} (${s.industry}, score ${s.score})`);
                });
            }

            lines.push(
                "",
                `## Problem`,
                "",
                brief.problem,
                "",
                `## Solution`,
                "",
                brief.solution,
                "",
                `## Target market`,
                "",
                brief.target_market,
                "",
                `## MVP scope`,
                "",
                brief.mvp_scope,
                "",
                `## Key features`,
                "",
                brief.key_features,
                "",
                `## Demo scenario`,
                "",
                brief.demo_scenario,
                "",
                `## Business model`,
                "",
                brief.business_model,
                "",
                `## Why this project can win a hackathon`,
                "",
                brief.why_it_can_win,
            );

            // Rich starter documentation
            if (brief.risks_and_mitigations) {
                lines.push("", `## Risks and mitigations`, "", brief.risks_and_mitigations);
            }
            if (brief.go_to_market) {
                lines.push("", `## Go-to-market strategy`, "", brief.go_to_market);
            }
            if (brief.key_metrics_to_track) {
                lines.push("", `## Key metrics to track in first 3 months`, "", brief.key_metrics_to_track);
            }
            if (brief.recommended_next_steps) {
                lines.push("", `## Recommended next steps (30/60/90 days)`, "", brief.recommended_next_steps);
            }
            if (brief.hackathon_tips) {
                lines.push("", `## Hackathon winning tips`, "", brief.hackathon_tips);
            }
            if (brief.improvement_suggestions) {
                lines.push("", `## Improvement suggestions (from success model)`, "", brief.improvement_suggestions);
            }

            if (brief.recommended_tech_stack) {
                lines.push("", `## Recommended tech stack`, "", brief.recommended_tech_stack);
            }
            if (brief.architecture_overview) {
                lines.push("", `## High-level architecture`, "", brief.architecture_overview);
            }
            if (brief.project_structure) {
                lines.push("", `## Suggested project structure`, "", "```\n" + brief.project_structure + "\n```");
            }
            if (brief.mvp_checklist) {
                lines.push("", `## MVP checklist & initial tasks`, "", brief.mvp_checklist);
            }
            if (brief.starter_readme) {
                lines.push("", `## Starter README.md content`, "", brief.starter_readme);
            }
            if (brief.pitch_outline) {
                lines.push("", `## Pitch deck outline`, "", brief.pitch_outline);
            }
            if (brief.demo_script) {
                lines.push("", `## Demo script outline`, "", brief.demo_script);
            }

            // Add Unicorn Track / AMD blurb
            lines.push("", "---", "", "Built for the Unicorn Track: demonstrate creativity using AMD GPUs or Fireworks AI credits. Showcase product potential, not benchmarks.");

            return lines.join("\n");
        }

        function renderScoreHTML(brief) {
            const score = Number(brief.success_score || 0);
            const pct = Math.max(0, Math.min(100, Math.round((score / 10) * 100)));
            const label = brief.success_label || "";
            const factors = brief.score_factors || {};
            const factorsText = Object.entries(factors).map(([k,v]) => `${k}: ${v}`).join(" • ");

            const scoreColor = score >= 8 ? '#22c55e' : score >= 6 ? '#eab308' : '#f87171';

            return `
                <div class="score-display">
                    <div style="font-size:0.65rem; color:#64748b; margin-bottom:0.1rem; letter-spacing:1px;">PREDICTED SUCCESS SCORE</div>
                    <div style="display:flex; align-items:baseline; justify-content:center; gap:6px;">
                        <div class="score-value" style="font-size:3.5rem; color:${scoreColor};">${score.toFixed(1)}</div>
                        <div style="font-size:1.1rem; color:#64748b; font-weight:500;">/ 10</div>
                    </div>
                    <div class="score-label" style="color:${scoreColor}; font-weight:700; letter-spacing:0.8px;">${label}</div>
                    <div class="progress" style="margin-top:0.55rem;"><div class="progress-bar" style="width:${pct}%; background: linear-gradient(to right, ${scoreColor}, #fff);"></div></div>
                    ${factorsText ? `<div style="font-size:0.68rem; color:#64748b; margin-top:0.35rem; opacity:0.9;">${factorsText}</div>` : ""}
                    ${brief.model_source ? `<div style="font-size:0.6rem; color:#475569; margin-top:0.15rem;">${brief.model_source}</div>` : ""}
                </div>
            `;
        }

        function renderBriefHTML(brief) {
            const sections = [
                { key: "problem", title: "Problem" },
                { key: "solution", title: "Solution" },
                { key: "target_market", title: "Target market" },
                { key: "mvp_scope", title: "MVP scope" },
                { key: "key_features", title: "Key features" },
                { key: "demo_scenario", title: "Demo scenario" },
                { key: "business_model", title: "Business model" },
                { key: "why_it_can_win", title: "Why this project can win a hackathon" },
            ];

            let html = `<h3>${brief.project_name || "Project"}</h3>`;
            if (brief.one_sentence_pitch) {
                html += `<div class="pitch">${brief.one_sentence_pitch}</div>`;
            }

            sections.forEach(sec => {
                const content = brief[sec.key] || "";
                if (content) {
                    html += `<h3>${sec.title}</h3><p>${content.replace(/\n/g, "<br>")}</p>`;
                }
            });

            // Rich starter kit sections
            const starterSections = [
                { key: "risks_and_mitigations", title: "Risks & Mitigations" },
                { key: "recommended_tech_stack", title: "Recommended Tech Stack (AMD + Fireworks)" },
                { key: "architecture_overview", title: "High-level Architecture" },
                { key: "project_structure", title: "Project Structure" },
                { key: "mvp_checklist", title: "MVP Checklist & Initial Tasks" },
                { key: "pitch_outline", title: "Pitch Deck Outline" },
                { key: "demo_script", title: "Demo Script" },
            ];

            let hasStarter = false;
            starterSections.forEach(sec => {
                const content = brief[sec.key] || "";
                if (content) {
                    if (!hasStarter) {
                        html += `<h3 style="margin-top:1rem; color:#fda4af;">🚀 Project Starter Kit</h3>`;
                        hasStarter = true;
                    }
                    html += `<h3>${sec.title}</h3><p>${content.replace(/\n/g, "<br>")}</p>`;
                }
            });

            if (brief.improvement_suggestions) {
                html += `<h3>Improvement Suggestions (from model)</h3><p>${brief.improvement_suggestions.replace(/\n/g, "<br>")}</p>`;
            }

            // Add AMD / sponsor note
            html += `<div style="margin-top:0.8rem; font-size:0.75rem; color:#64748b; border-top:1px solid #1e2937; padding-top:0.5rem;">
                Built for the Unicorn Track — powered by AMD + Fireworks AI.
            </div>`;

            return html;
        }

        async function generateBrief() {
            const data = getFormData();
            if (!data.project_idea) {
                alert("Project idea is required.");
                return;
            }

            generateBtn.disabled = true;
            statusEl.textContent = "Generating your startup brief…";
            document.getElementById("score_area").style.display = "none";
            document.getElementById("brief_content").style.display = "none";
            const dlAreaHide = document.getElementById("download_area");
            if (dlAreaHide) dlAreaHide.style.display = "none";
            outputEl.style.display = "block";
            outputEl.innerHTML = `<span class="spinner"></span> Thinking with Fireworks AI + AMD-tuned model...`;

            try {
                const response = await fetch(`${apiBaseUrl}/generate-brief`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data),
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.detail || "Unexpected error from backend.");
                }

                const brief = await response.json();
                lastBrief = brief;  // for downloads and rich features

                // Keep markdown version for "Copy" (hidden pre)
                const md = toMarkdown(brief);
                outputEl.textContent = md;

                // Show beautiful structured HTML version
                const briefDiv = document.getElementById("brief_content");
                briefDiv.innerHTML = renderBriefHTML(brief);
                briefDiv.style.display = "block";
                outputEl.style.display = "none";

                // Show download buttons once we have rich content
                const dlArea = document.getElementById("download_area");
                if (dlArea) dlArea.style.display = "flex";

                // Visual score display with pop animation
                const scoreArea = document.getElementById("score_area");
                if (brief.success_score != null) {
                    scoreArea.style.display = "block";
                    scoreArea.innerHTML = renderScoreHTML(brief);
                    // Add entrance animation
                    const scoreEl = scoreArea.firstElementChild;
                    if (scoreEl) {
                        scoreEl.style.opacity = '0';
                        scoreEl.style.transform = 'scale(0.92)';
                        scoreEl.style.transition = 'all 420ms cubic-bezier(0.34,1.56,0.64,1)';
                        requestAnimationFrame(() => {
                            scoreEl.style.opacity = '1';
                            scoreEl.style.transform = 'scale(1)';
                        });
                    }
                } else {
                    scoreArea.style.display = "none";
                }

                const source = brief.llm_source ? `Source: ${brief.llm_source}. ` : "";
                if (brief.success_score !== null && brief.success_score !== undefined) {
                    const label = brief.success_label ? ` — ${brief.success_label}` : "";
                    statusEl.textContent = `${source}Success score: ${Number(brief.success_score).toFixed(1)}/10${label}.`;
                } else {
                    statusEl.textContent = `${source}Done.`;
                }
            } catch (err) {
                console.error("Fetch error to", apiBaseUrl, err);
                let msg = "Failed to reach backend.";
                if (err.message && err.message.includes("fetch")) {
                    msg += ` Is the backend running on ${apiBaseUrl}?`;
                } else if (err.message) {
                    msg += " " + err.message;
                }
                statusEl.textContent = msg;
                const bc = document.getElementById("brief_content");
                bc.style.display = "none";
                const dlAreaErr = document.getElementById("download_area");
                if (dlAreaErr) dlAreaErr.style.display = "none";
                outputEl.style.display = "block";
                outputEl.textContent = "(Error — see status above)";
                lastBrief = null;
            } finally {
                generateBtn.disabled = false;
            }
        }

        async function copyMarkdown() {
            const text = outputEl.textContent || "";
            if (!text || text === "(Waiting for input...)" || text.includes("Thinking with")) {
                statusEl.textContent = "Nothing to copy yet.";
                return;
            }
            try {
                await navigator.clipboard.writeText(text);
                statusEl.textContent = "Copied Markdown to clipboard.";
            } catch (err) {
                console.error(err);
                statusEl.textContent = "Could not copy to clipboard.";
            }
        }

        copyBtn.addEventListener("click", copyMarkdown);
        loadSystemStatus();

        // Simple persistence for better UX (localStorage)
        const FIELDS = ["project_idea", "target_users", "industry", "available_time", "available_technologies", "team_size", "total_funding"];
        function saveForm() {
            const data = {};
            FIELDS.forEach(id => {
                const el = document.getElementById(id);
                if (el) data[id] = el.value;
            });
            try { localStorage.setItem("unicornforge_last_input", JSON.stringify(data)); } catch(e){}
        }
        function restoreForm() {
            try {
                const raw = localStorage.getItem("unicornforge_last_input");
                if (!raw) return;
                const data = JSON.parse(raw);
                FIELDS.forEach(id => {
                    const el = document.getElementById(id);
                    if (el && data[id] != null) el.value = data[id];
                });
            } catch(e){}
        }
        // Auto-save on input changes
        FIELDS.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.addEventListener("input", saveForm);
        });

        // Wrap generate to save before call + attach listener
        const realGenerate = generateBrief;
        generateBrief = async function wrappedGenerate() {
            saveForm();
            return realGenerate.apply(this, arguments);
        };
        generateBtn.addEventListener("click", generateBrief);

        // --- Download helpers for rich starter documentation ---
        let lastBrief = null;

        function downloadText(filename, content) {
            const blob = new Blob([content], { type: "text/markdown;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function buildFullKitMarkdown(brief) {
            return toMarkdown(brief);
        }

        function buildReadme(brief) {
            return brief.starter_readme || `# ${brief.project_name}\n\n${brief.one_sentence_pitch}\n\nSee the full generated brief for details.`;
        }

        function buildMvpChecklist(brief) {
            let md = `# MVP Checklist & Tasks for ${brief.project_name}\n\n`;
            if (brief.mvp_checklist) md += brief.mvp_checklist + "\n\n";
            md += `## Core MVP Scope\n${brief.mvp_scope || ""}\n`;
            return md;
        }

        function buildPitchDemo(brief) {
            let md = `# Pitch & Demo Materials - ${brief.project_name}\n\n`;
            if (brief.pitch_outline) md += `## Pitch Deck Outline\n\n${brief.pitch_outline}\n\n`;
            if (brief.demo_script) md += `## Demo Script\n\n${brief.demo_script}\n\n`;
            if (brief.hackathon_tips) md += `## Hackathon Tips\n\n${brief.hackathon_tips}\n`;
            return md;
        }

        const dlFull = document.getElementById("dl_full_kit");
        const dlReadme = document.getElementById("dl_readme");
        const dlMvp = document.getElementById("dl_mvp");
        const dlPitch = document.getElementById("dl_pitch");

        function ensureBrief() {
            if (!lastBrief) {
                alert("Generate a brief first!");
                return null;
            }
            return lastBrief;
        }

        if (dlFull) dlFull.addEventListener("click", () => {
            const b = ensureBrief(); if (!b) return;
            downloadText(`${(b.project_name || "project").toLowerCase().replace(/\s+/g, "-")}-starter-kit.md`, buildFullKitMarkdown(b));
        });
        if (dlReadme) dlReadme.addEventListener("click", () => {
            const b = ensureBrief(); if (!b) return;
            downloadText("README.md", buildReadme(b));
        });
        if (dlMvp) dlMvp.addEventListener("click", () => {
            const b = ensureBrief(); if (!b) return;
            downloadText("MVP-Checklist.md", buildMvpChecklist(b));
        });
        if (dlPitch) dlPitch.addEventListener("click", () => {
            const b = ensureBrief(); if (!b) return;
            downloadText("Pitch-Demo.md", buildPitchDemo(b));
        });

        restoreForm();
    </script>
</body>
</html>
